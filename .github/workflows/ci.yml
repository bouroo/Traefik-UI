name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: |
          bun run format
          if ! git diff --exit-code; then
            echo "Formatting issues detected. Auto-fixing and pushing..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "style: auto-fix formatting [skip ci]"
            git push
            echo "::error::Formatting was fixed and pushed. CI will re-run automatically."
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify output
        run: ls -la dist/

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
