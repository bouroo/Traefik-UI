<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traefik-UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
      integrity="sha384-zaeBlB/vwYsDRSlFajnDd7OydJ0cWk+c2OWybl3eSUf6hW2EbhlCsQPqKr3gkznT"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css"
      integrity="sha384-05WuhgjXiqmZzcQ3vQRQ39HN356Yqb+SnhvELzFtpwS5b2IlqE8QsOO5LCSJ2znj"
      crossorigin="anonymous"
    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"
      integrity="sha384-ZYmwuq4n2gOcNxMSiJ6jyTjT+BbIilr7p6dlq6q5nmSWKmsH9UU4K1qqjycMkfmR"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"
      integrity="sha384-9q49Jm3hZMwxwxEMLImsxPxLiaptHpFz1PVa26Dg6SVIO+rj5kx0cgOM2+4ikKJFH9"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <!-- Login Screen (shown when not authenticated) -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center hidden">
      <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Traefik-UI</h1>
          <p class="text-gray-500 dark:text-gray-400 mt-2">Sign in to manage your Traefik proxy</p>
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Username</label
            >
            <input
              type="text"
              id="login-username"
              required
              class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="login-password"
              required
              class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none"
            />
          </div>
          <div id="login-error" class="text-red-500 text-sm hidden"></div>
          <button
            type="submit"
            class="w-full py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors"
          >
            Sign In
          </button>
        </form>
      </div>
    </div>

    <!-- Main App (shown when authenticated) -->
    <div id="app-screen" class="flex h-full hidden">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col"
      >
        <div class="p-4 border-b border-gray-200 dark:border-gray-700">
          <h1 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
            <i class="ri-server-line text-primary-600"></i> Traefik-UI
          </h1>
        </div>
        <nav id="sidebar-nav" class="flex-1 p-4 space-y-1 overflow-y-auto">
          <!-- Nav items will be rendered by JS -->
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
          <div class="flex items-center gap-3">
            <div
              class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900 flex items-center justify-center"
            >
              <span
                id="user-initial"
                class="text-sm font-bold text-primary-700 dark:text-primary-300"
                >A</span
              >
            </div>
            <div class="flex-1 min-w-0">
              <p id="user-name" class="text-sm font-medium truncate">admin</p>
              <button
                id="logout-btn"
                class="text-xs text-gray-500 hover:text-red-500 transition-colors"
              >
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto">
        <header
          class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-4 flex items-center justify-between"
        >
          <div>
            <h2 id="page-title" class="text-lg font-semibold">Dashboard</h2>
            <p id="page-subtitle" class="text-sm text-gray-500 dark:text-gray-400">
              Overview of your Traefik proxy
            </p>
          </div>
          <div class="flex items-center gap-3">
            <button
              id="theme-toggle"
              class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
              title="Toggle theme"
            >
              <i class="ri-sun-line dark:hidden"></i>
              <i class="ri-moon-line hidden dark:inline"></i>
            </button>
            <span id="connection-status" class="flex items-center gap-1 text-sm">
              <span class="w-2 h-2 rounded-full bg-green-500"></span>
              <span class="text-gray-500 dark:text-gray-400 text-xs">Connected</span>
            </span>
          </div>
        </header>
        <div id="page-content" class="p-6">
          <!-- Page content rendered by JS -->
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/components.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/router.js"></script>
    <script src="/assets/js/dashboard.js"></script>
    <script src="/assets/js/routers.js"></script>
    <script src="/assets/js/services.js"></script>
    <script src="/assets/js/middlewares.js"></script>
    <script src="/assets/js/tls.js"></script>
    <script src="/assets/js/system.js"></script>
    <script src="/assets/js/configfile.js"></script>
    <script src="/assets/js/app.js"></script>
  </body>
</html>
